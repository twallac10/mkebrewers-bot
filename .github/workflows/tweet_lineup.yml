name: Post Lineup to Bluesky

on:
  schedule:
    # Runs hourly, but the job will only proceed between 8am and 6pm CT.
    - cron: '0 12-23 * * *'  # Every hour from 7 AM to 6 PM CDT (runtime TZ check limits to 8 AM–6 PM CT)
  workflow_dispatch:

jobs:
  post_lineup:
    runs-on: ubuntu-latest
    permissions:
      packages: read
    container:
      image: ghcr.io/twallac10/mkebrewers-bot:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
    - name: Check Time in Team Timezone
      id: time_check
      shell: bash
      run: |
        if [[ $(TZ="America/Chicago" date +'%H') -ge 8 && $(TZ="America/Chicago" date +'%H') -lt 18 ]]; then
          echo "Proceeding, it's between 8am and 6pm CT."
          echo "proceed=true" >> $GITHUB_OUTPUT
        else
          echo "Stopping, it's outside of 8am-6pm ET."
          echo "proceed=false" >> $GITHUB_OUTPUT
        fi

    - uses: actions/checkout@v4
      if: steps.time_check.outputs.proceed == 'true'

    - name: Set up AWS Credentials
      if: steps.time_check.outputs.proceed == 'true'
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-2

    - name: Fetch lineup and post to Bluesky
      if: steps.time_check.outputs.proceed == 'true'
      env:
        BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
        BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
        PYTHONPATH: ${{ github.workspace }}
      run: python scripts/17_fetch_lineup.py --post
