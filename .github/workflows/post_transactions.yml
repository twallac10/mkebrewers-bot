name: Post Transaction Updates to Bluesky

on:
  schedule:
    # Runs every 2 hours during daytime hours CT (converted to UTC)
    - cron: '0 13,15,17,19,21,23,1 * * *'  # 8 AM, 10 AM, 12 PM, 2 PM, 4 PM, 6 PM, 8 PM CDT (UTC-5)
  workflow_dispatch:
    inputs:
      force:
        description: 'Force posting regardless of time constraints'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  post_transactions:
    runs-on: ubuntu-latest
    permissions:
      packages: read
    container:
      image: ghcr.io/twallac10/mkebrewers-bot:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2

      - name: Run transaction fetch and post to Bluesky
        env:
          BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
          PYTHONPATH: ${{ github.workspace }}
        run: |
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            python scripts/26_post_transactions.py --post --force
          else
            python scripts/26_post_transactions.py --post
          fi
