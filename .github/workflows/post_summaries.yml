name: Post Daily Summaries to Bluesky

on:
  schedule:
    # Runs every 2 hours during daytime hours CT (converted to UTC)
    - cron: '0 14,16,18,20,22 * * *'  # 9 AM, 11 AM, 1 PM, 3 PM, 5 PM CDT (UTC-5)
  workflow_dispatch:
    inputs:
      summary_type:
        description: 'Type of summary to post (auto, summary, batting, pitching)'
        required: false
        default: 'auto'

jobs:
  post_summary:
    name: Post Daily Summary Updates to Bluesky
    runs-on: ubuntu-latest
    permissions:
      packages: read
    container:
      image: ghcr.io/twallac10/mkebrewers-bot:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2

      - name: Run Post Summary Script
        env:
          BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
          PYTHONPATH: ${{ github.workspace }}
        run: |
          if [ "${{ github.event.inputs.summary_type }}" = "" ]; then
            python scripts/23_post_daily_summaries.py --type auto
          else
            python scripts/23_post_daily_summaries.py --type ${{ github.event.inputs.summary_type }}
          fi
